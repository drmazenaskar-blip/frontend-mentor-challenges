<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet">
  <title>Frontend Mentor | Fylo data storage component</title>

</head>

<body>
  <main>
    <div class="container">
      <div class="card">
        <div class="img-1">
          <img src="images/logo.svg" alt="logo">
        </div>
        <div class="img-2">
         <div class="black"><img src="images/icon-document.svg" alt="icon-document"></div>
         <div class="black"><img src="images/icon-folder.svg" alt="icon-folder"></div>
         <div class="black"> <img src="images/icon-upload.svg" alt="icon-upload"></div>
        </div>
      </div>
      <div class="storage">
        <div class="bubble">
          <strong>185</strong> <span>GB Left</span>
        </div>

        <h1>You’ve used <strong>815 GB</strong> of your storage</h1>
        <div class="line">
          <span class="progress"></span>
        </div>
        <div class="info">
          <span>0 GB</span>
          <span>1000 GB</span>
        </div>
      </div>

    </div>
  </main>


  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>

</html>
