<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Stats preview card component</title>


</head>

<body>
  <main>
    <article class="card">
      <figure class="image-container">
        <img src="images/image-header-desktop.jpg" alt="">
      </figure>
      <div class="card-content">
        <div class="text">
          <h1> Get <strong>insights</strong> that help your business grow.</h1>
          <p>
            Discover the benefits of data analytics and make better decisions regarding revenue, customer
            experience, and overall efficiency.
          </p>
        </div>
        <ul class="stats">
          <li>
            10k+ <strong>companies</strong>
          </li>
          <li>
            314 <strong>templates</strong>
          </li>
          <li>
            12m+ <strong>queries</strong>
          </li>
        </ul>

      </div>
    </article>
  </main>



  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="https://github.com/drmazenaskar-blip">DR-Mazen</a>.
  </footer>



</body>

</html>
