<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Stats preview card component</title>


</head>

<body>
  <main>
    <div class="card">
      <div class="image-container">
        <img src="images/image-header-desktop.jpg" alt="Stats">
      </div>
      <div class="card-content">
        <div class="text">
          <h1> Get <strong>insights</strong> that help your business grow.</h1>
          <p>
            Discover the benefits of data analytics and make better decisions regarding revenue, customer
            experience, and overall efficiency.
          </p>
        </div>
        <div class="stats">
          <span>10k+ <strong>companies</strong></span>
          <span>314 <strong>templates</strong></span>
          <span>12m+ <strong>queries</strong></span>

        </div>

      </div>
    </div>
  </main>



  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="https://github.com/drmazenaskar-blip">DR-Mazen</a>.
  </footer>



</body>

</html>
