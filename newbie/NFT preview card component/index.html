<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <title>Frontend Mentor | NFT preview card component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->

</head>

<body>
  <main>
    <div class="card">
      <div class="image-container"> <img src="images/image-equilibrium.jpg" alt=""></div>
      <div class="info-container">
        <h1>Equilibrium #3429</h1>
        <p>Our Equilibrium collection promotes balance and calm.</p>
        <div class="stats">
          <span> 💎 0.041 ETH</span>
          <span><i class="fa-solid fa-stopwatch"></i> 3 days left</span>
        </div>
      </div>
      <div class="author">
        <img src="images/image-avatar.png" alt="avater">
        <span>
          <span class="creation-text">Creation of</span>
          <a href="#" class="author-name">Jules Wyvern</a>
        </span>

      </div>
    </div>
  </main>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
    Coded by <a href="https://github.com/drmazenaskar-blip" target=_blank>DR-Mazen</a>.
  </footer>
</body>

</html>
