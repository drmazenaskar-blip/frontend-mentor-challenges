<!DOCTYPE html>
<html lang="en">

<head>
  <!-- ==========meta-link -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ============icon-link -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <!-- ============css-link -->
  <link rel="stylesheet" href="style.css">
  <!-- ==============google-font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Open+Sans:wght@400&display=swap"
    rel="stylesheet">
  <title>Frontend Mentor | Huddle landing page with single introductory section</title>
</head>

<body>
  <main>
    <header class="header"><img src="images/logo-2.png" alt="Huddle"></header>
    <section class="content">
      <div class="info">
        <figure class="img">
          <img src="images/Container-desktop.png" alt="">
        </figure>
        <div class="text">
          <div class="head">
            <h1>
              Build The Community Your Fans Will Love
            </h1>
            <p>
              Huddle re-imagines the way we build communities. You have a voice, but so does your audience.
              Create connections with your users as you engage in genuine discussion.
            </p>
          </div>
          <a href="#" class="btn-register">Register</a>
        </div>
      </div>
      <ul aria-label="social-media-icons">
        <li><i class="fa-brands fa-facebook-f"></i></li>
        <li><i class="fa-brands fa-twitter"></i></li>
        <li class="bumb">
          <a href="https://github.com/drmazenaskar-blip" target="_blank" aria-label="Github Profile">
            <i class="fa-brands fa-github"></i>
          </a>
        </li>
        <li><i class="fa-brands fa-instagram"></i></li>
      </ul>

    </section>
  </main>

</body>

</html>
