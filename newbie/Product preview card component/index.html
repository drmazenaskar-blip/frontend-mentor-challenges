<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Frontend Mentor | Product preview card component</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main>
        <section>
            <div class="img">
                <picture>
                    <source media="(max-width: 767px)" srcset="images/image-product-mobile.jpg">
                    <img src="images/image-product-desktop.jpg" alt="Gabrielle Perfume Bottle">
                </picture>
            </div>

            <div class="text">
                <h3>Perfume</h3>
                
                <h1>Gabrielle Essence Eau De Parfum</h1>
                
                <p>
                    A floral, solar and voluptuous interpretation composed by Olivier Polge,
                    Perfumer-Creator for the House of CHANEL.
                </p>

                <span data-old-price="$169.99">$149.99</span>

                <button>
                    <i class="fa-solid fa-cart-shopping"></i>
                    Add to Cart
                </button>
            </div>
        </section>
    </main>

    <footer class="attribution">
        Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
        Coded by <a href="https://github.com/drmazenaskar-blip" target="_blank">Dr-Mazen</a>.
    </footer>

</body>
</html>
