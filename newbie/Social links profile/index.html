<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <!-- style link -->
    <link rel="stylesheet" href="style.css">
    <!-- font link -->

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Mentor | Social links profile</title>
</head>
<style>
    .attribution {
        font-size: 0.6875rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        max-width: 320px;
        margin: 20px auto 0;
        color: var(--white);
    }
    .attribution a {
        color: var(--white);
        text-decoration: none;
    }
    .attribution a:hover {
        text-decoration: underline;
    }
</style>

<body>
    <main>
        <section>
            <div class="logo"> <img src="assets/images/avatar-jessica.jpeg" alt="image"></div>
            <div class="text">
                <h1>Jessica Randall</h1>
                <p>London, United Kingdom</p>
                </h1>
            </div>
            <div class="social-link">
                <h6>"Front-end developer and avid reader."</h6>
                <ul>
                    <li><a href="#">GitHub</a></li>
                    <li><a href="#">Frontend Mentor</a></li>
                    <li><a href="#">LinkedIn</a></li>
                    <li><a href="#">Twitter</a></li>
                    <li><a href="#">Instagram</a></li>
                </ul>
            </div>


        </section>
    </main>

    <footer class="attribution">
        <span>Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend
                Mentor</a>.</span>
        <span>Coded by <a href="https://github.com/drmazenaskar-blip">DR-Mazen</a>.</span>
    </footer>
</body>

</html>
