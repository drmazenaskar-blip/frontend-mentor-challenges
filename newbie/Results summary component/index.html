<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@100..900&display=swap" rel="stylesheet">
    <title> Results summary component</title>
</head>

<body>
    <div class="container">
        <div class="rtl-column">
            <h2>Your result</h2>
            <div class="circle">
                <strong>76</strong>
                <span>of 100</span>
            </div>
            <div class="result">
                <h3>Great</h3>
                <p>You scored higher than 65% of the people who have taken these tests.</p>

            </div>
        </div>
        <div class="lft-column">
            <h2>summary</h2>
            <ul>
                <li>

                    <span> ⚡Reaction</span>
                    <span data-text="80"> / 100</span>
                </li>
                <li>

                    <span >🧠 Memory</span>
                    <span data-text="92"> / 100</span>
                </li>
                <li>

                    <span > 💬 Verbal</span>
                    <span data-text="61">/ 100</span>
                </li>
                <li>

                    <span > 👁️ Visual</span>
                    <span data-text="73"> / 100</span>
                </li>
            </ul>
            <button type="button">Continue</button>
        </div>
    </div>
</body>

</html>
